<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Narrador</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0c0b09;
    --paper: #13110e;
    --border: #2a2520;
    --gold: #c8a96e;
    --gold2: #8a6f3e;
    --text: #e8e2d8;
    --muted: #6a6258;
    --red: #c0624a;
    --green: #6a9e72;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    line-height: 1.6;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 999;
    opacity: 0.4;
  }

  .app {
    max-width: 600px;
    margin: 0 auto;
    padding: 24px 16px 48px;
    min-height: 100vh;
  }

  .header {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 32px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }

  .header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    font-weight: 300;
    font-style: italic;
    color: var(--gold);
    letter-spacing: -0.5px;
  }

  .header span {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .section { margin-bottom: 24px; }

  .section-label {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .key-row { display: flex; gap: 8px; }
  .key-row + .key-row { margin-top: 6px; }

  input[type="password"], input[type="text"] {
    flex: 1;
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 10px 12px;
    outline: none;
    transition: border-color 0.2s;
  }

  input:focus { border-color: var(--gold2); }

  .btn-sm {
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 10px 14px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .btn-sm:hover { border-color: var(--gold2); color: var(--text); }
  .btn-sm.saved { border-color: var(--green); color: var(--green); }

  .voice-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 6px;
  }

  .voice-wrap { display: flex; gap: 4px; }

  .voice-chip {
    flex: 1;
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 8px 6px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }

  .voice-chip:hover { border-color: var(--gold2); color: var(--text); }
  .voice-chip.active { border-color: var(--gold); color: var(--gold); background: rgba(200,169,110,0.06); }

  .preview-btn {
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    padding: 8px 9px;
    cursor: pointer;
    transition: all 0.15s;
    flex-shrink: 0;
  }

  .preview-btn:hover { border-color: var(--gold2); color: var(--gold); }
  .preview-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  textarea {
    width: 100%;
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    font-weight: 300;
    line-height: 1.7;
    padding: 14px;
    outline: none;
    resize: vertical;
    min-height: 200px;
    transition: border-color 0.2s;
  }

  textarea:focus { border-color: var(--gold2); }
  textarea::placeholder { color: var(--muted); font-style: italic; }

  .char-count {
    text-align: right;
    font-size: 10px;
    color: var(--muted);
    margin-top: 4px;
  }

  .upload-zone {
    border: 1px dashed var(--border);
    border-radius: 6px;
    padding: 16px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    color: var(--muted);
    font-size: 12px;
  }

  .upload-zone:hover { border-color: var(--gold2); color: var(--text); }
  .upload-zone input { display: none; }

  .btn-generate {
    width: 100%;
    background: var(--gold);
    border: none;
    border-radius: 8px;
    color: #0c0b09;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 400;
    padding: 16px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-top: 8px;
  }

  .btn-generate:hover { opacity: 0.88; }
  .btn-generate:active { transform: scale(0.99); }
  .btn-generate:disabled { opacity: 0.35; cursor: not-allowed; }

  .progress-wrap { display: none; margin-top: 16px; }

  .progress-bar-bg {
    background: var(--border);
    border-radius: 4px;
    height: 4px;
    overflow: hidden;
    margin-bottom: 8px;
  }

  .progress-bar-fill {
    height: 100%;
    background: var(--gold);
    border-radius: 4px;
    transition: width 0.4s ease;
    width: 0%;
  }

  .progress-text {
    font-size: 11px;
    color: var(--muted);
    text-align: center;
  }

  .player-wrap {
    display: none;
    margin-top: 20px;
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
  }

  .player-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-weight: 300;
    font-style: italic;
    color: var(--gold);
    margin-bottom: 14px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  audio {
    width: 100%;
    accent-color: var(--gold);
    border-radius: 4px;
  }

  .player-buttons { display: flex; gap: 8px; margin-top: 12px; }

  .download-btn {
    flex: 1;
    display: block;
    text-align: center;
    padding: 10px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.15s;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .download-btn:hover { border-color: var(--gold2); color: var(--text); }

  .status {
    margin-top: 12px;
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    min-height: 16px;
  }

  .status.error { color: var(--red); }
  .status.ok { color: var(--green); }

  .tabs { display: flex; gap: 4px; margin-bottom: 12px; }

  .tab {
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 7px 14px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.5px;
  }

  .tab.active { border-color: var(--gold); color: var(--gold); }
  .tab:hover:not(.active) { border-color: var(--gold2); color: var(--text); }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  .speed-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 10px;
  }

  .speed-row label {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    white-space: nowrap;
  }

  input[type="range"] {
    flex: 1;
    accent-color: var(--gold);
    height: 3px;
  }

  .speed-val { font-size: 11px; color: var(--gold); width: 30px; text-align: right; }

  .model-select {
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 8px 10px;
    outline: none;
    cursor: pointer;
  }
  .model-select:focus { border-color: var(--gold2); }

  .ia-row { display: flex; gap: 8px; margin-top: 8px; align-items: stretch; }

  .btn-claude {
    flex: 1;
    background: var(--paper);
    border: 1px solid var(--gold2);
    border-radius: 6px;
    color: var(--gold);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 8px 14px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.5px;
  }
  .btn-claude:hover { background: rgba(200,169,110,0.08); }
  .btn-claude:disabled { opacity: 0.4; cursor: not-allowed; }

  .search-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 10px;
    font-size: 11px;
    color: var(--muted);
    cursor: pointer;
    user-select: none;
  }
  .search-toggle input { accent-color: var(--gold); cursor: pointer; }
  .search-toggle:hover { color: var(--text); }

  /* Jobs queue */
  .jobs-section { margin-top: 28px; }

  .job-card {
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 10px;
    transition: border-color 0.2s;
  }
  .job-card.status-done    { border-color: var(--green); }
  .job-card.status-error   { border-color: var(--red); }
  .job-card.status-writing,
  .job-card.status-recording,
  .job-card.status-pending { border-color: var(--gold2); }

  .job-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
    margin-bottom: 10px;
  }

  .job-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 15px;
    font-weight: 300;
    font-style: italic;
    color: var(--gold);
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .job-meta {
    font-size: 10px;
    color: var(--muted);
    white-space: nowrap;
    flex-shrink: 0;
  }

  .job-progress { margin-bottom: 12px; }

  .job-actions { display: flex; gap: 6px; }

  .job-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    padding: 7px 12px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .job-btn:hover { border-color: var(--gold2); color: var(--text); }
  .job-btn.play { border-color: var(--gold); color: var(--gold); }
  .job-btn.play:hover { background: rgba(200,169,110,0.08); }
  .job-btn.del:hover { border-color: var(--red); color: var(--red); }
  .job-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  .generating { animation: pulse 1.5s ease infinite; }
  .pulsing .progress-bar-fill { animation: pulse 1.5s ease infinite; }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <h1>Narrador</h1>
    <span>chirp 3 hd</span>
  </div>

  <!-- Claves -->
  <div class="section">
    <div class="section-label">Claves</div>
    <div class="key-row">
      <input type="password" id="apiKey" placeholder="Google TTS: AIzaSy..." autocomplete="off">
      <button class="btn-sm" id="saveBtn" onclick="saveKey()">TTS</button>
    </div>
    <div class="key-row">
      <input type="password" id="backendKey" placeholder="Narrador API key..." autocomplete="off">
      <button class="btn-sm" id="saveBackendBtn" onclick="saveBackendKey()">API</button>
    </div>
  </div>

  <!-- Voice -->
  <div class="section">
    <div class="section-label">Voz</div>
    <div class="voice-grid" id="voiceGrid"></div>
    <div class="speed-row">
      <label>Velocidad</label>
      <input type="range" id="speedRange" min="0.7" max="1.4" step="0.05" value="1.0"
             oninput="document.getElementById('speedVal').textContent=this.value+'x'">
      <span class="speed-val" id="speedVal">1.0x</span>
    </div>
  </div>

  <!-- Contenido -->
  <div class="section">
    <div class="section-label">Contenido</div>
    <div class="tabs">
      <button class="tab" data-tab="ia" onclick="switchTab('ia', this)">✦ IA</button>
      <button class="tab active" data-tab="text" onclick="switchTab('text', this)">Texto</button>
      <button class="tab" data-tab="pdf" onclick="switchTab('pdf', this)">PDF / TXT</button>
    </div>

    <div class="tab-content" id="tab-ia">
      <textarea id="promptInput" style="min-height:120px"
        placeholder="Pedile a Claude lo que querés escuchar. Ej: haceme un podcast de 30 min sobre la historia del tango, con anécdotas y detalles de los barrios..."></textarea>
      <label class="search-toggle">
        <input type="checkbox" id="webSearchToggle">
        <span>🔎 Investigar en la web (temas de actualidad)</span>
      </label>
      <div class="ia-row">
        <select class="model-select" id="modelSelect">
          <option value="claude-haiku-4-5">Haiku 4.5 (rápido)</option>
          <option value="claude-sonnet-4-6">Sonnet 4.6</option>
          <option value="claude-opus-4-7">Opus 4.7</option>
        </select>
        <button class="btn-claude" id="claudeBtn" onclick="submitJob()">✦ Generar podcast</button>
      </div>
    </div>

    <div class="tab-content active" id="tab-text">
      <textarea id="textInput" placeholder="Pegá acá el texto que querés escuchar..." oninput="updateCount()"></textarea>
      <div class="char-count"><span id="charCount">0</span> caracteres</div>
    </div>

    <div class="tab-content" id="tab-pdf">
      <div class="upload-zone" onclick="document.getElementById('fileInput').click()">
        <input type="file" id="fileInput" accept=".txt,.md" onchange="loadFile(event)">
        <div>📄 Tocá para cargar un archivo .txt o .md</div>
        <div style="margin-top:6px;font-size:10px;opacity:0.6">(PDF próximamente)</div>
      </div>
    </div>
  </div>

  <!-- Jobs queue (solo visible cuando hay jobs) -->
  <div class="jobs-section" id="jobsSection" style="display:none">
    <div class="section-label">Cola de podcasts</div>
    <div id="jobsList"></div>
  </div>

  <!-- Botón Generar Audio (solo para tabs Texto y PDF) -->
  <button class="btn-generate" id="genBtn" onclick="generate()">▶ Generar Audio</button>

  <!-- Progress TTS -->
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progressFill"></div>
    </div>
    <div class="progress-text" id="progressText">Preparando...</div>
  </div>

  <!-- Player directo (Texto / PDF) -->
  <div class="player-wrap" id="playerWrap">
    <div class="player-title" id="playerTitle">—</div>
    <audio id="audioPlayer" controls></audio>
    <div class="player-buttons">
      <a class="download-btn" id="downloadBtn" href="#" download="narrador.mp3">⬇ Descargar</a>
      <button class="download-btn" id="shareBtn" onclick="shareBlob(window._currentBlob, 'narrador.mp3')"
              style="display:none;cursor:pointer">⇪ Compartir</button>
    </div>
  </div>

  <div class="status" id="status"></div>

</div>

<script>
const BACKEND_URL = 'https://narrador-api-production.up.railway.app';

const VOICES = [
  'Achird','Achernar','Algenib','Algieba','Alnilam',
  'Aoede','Callirrhoe','Charon','Despina','Enceladus',
  'Fenrir','Gacrux','Iocaste','Kore','Laomedeia',
  'Leda','Orus','Puck','Schedar','Sulafat',
  'Umbriel','Vindemiatrix','Zubenelgenubi'
];

let selectedVoice = localStorage.getItem('voice') || 'Achird';
const PREVIEW_TEXT = "Llegué tarde. Otra vez. Vi la luz apagada en su cuarto... y supe que se había dormido esperándome.";

// ─── Boot ──────────────────────────────────────────────────────
window.onload = () => {
  buildVoiceGrid();

  const savedGcp = localStorage.getItem('gcpKey');
  if (savedGcp) {
    document.getElementById('apiKey').value = savedGcp;
    markSaved('saveBtn', '✓ TTS');
  }

  const savedBk = localStorage.getItem('backendKey');
  if (savedBk) {
    document.getElementById('backendKey').value = savedBk;
    markSaved('saveBackendBtn', '✓ API');
  }

  const savedModel = localStorage.getItem('claudeModel');
  if (savedModel) document.getElementById('modelSelect').value = savedModel;
  document.getElementById('modelSelect').addEventListener('change', e =>
    localStorage.setItem('claudeModel', e.target.value)
  );

  const savedSearch = localStorage.getItem('webSearch') === '1';
  document.getElementById('webSearchToggle').checked = savedSearch;
  document.getElementById('webSearchToggle').addEventListener('change', e =>
    localStorage.setItem('webSearch', e.target.checked ? '1' : '0')
  );

  if (navigator.share) document.getElementById('shareBtn').style.display = 'block';

  // Mostrar/ocultar botón de audio según tab activo
  updateGenBtn();
  loadJobs();
  startPolling();
};

function markSaved(btnId, text) {
  const b = document.getElementById(btnId);
  b.textContent = text;
  b.classList.add('saved');
}

// ─── Keys ──────────────────────────────────────────────────────
function saveKey() {
  const k = document.getElementById('apiKey').value.trim();
  if (!k) return;
  localStorage.setItem('gcpKey', k);
  markSaved('saveBtn', '✓ TTS');
}

function saveBackendKey() {
  const k = document.getElementById('backendKey').value.trim();
  if (!k) return;
  localStorage.setItem('backendKey', k);
  markSaved('saveBackendBtn', '✓ API');
}

function getBackendKey() {
  return document.getElementById('backendKey').value.trim() || localStorage.getItem('backendKey') || '';
}

// ─── Voice grid ────────────────────────────────────────────────
function buildVoiceGrid() {
  const grid = document.getElementById('voiceGrid');
  grid.innerHTML = '';
  VOICES.forEach(v => {
    const wrap = document.createElement('div');
    wrap.className = 'voice-wrap';

    const btn = document.createElement('button');
    btn.className = 'voice-chip' + (v === selectedVoice ? ' active' : '');
    btn.textContent = v;
    btn.onclick = () => {
      selectedVoice = v;
      localStorage.setItem('voice', v);
      document.querySelectorAll('.voice-chip').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    };

    const prev = document.createElement('button');
    prev.className = 'preview-btn';
    prev.title = 'Escuchar preview';
    prev.textContent = '▶';
    prev.onclick = e => { e.stopPropagation(); playPreview(v, prev); };

    wrap.appendChild(btn);
    wrap.appendChild(prev);
    grid.appendChild(wrap);
  });
}

async function playPreview(voice, btnEl) {
  const apiKey = document.getElementById('apiKey').value.trim() || localStorage.getItem('gcpKey');
  if (!apiKey) { setStatus('Necesitás la API Key de Google TTS para escuchar previews', 'error'); return; }

  btnEl.textContent = '…';
  btnEl.disabled = true;

  try {
    const url = `https://texttospeech.googleapis.com/v1beta1/text:synthesize?key=${apiKey}`;
    const resp = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        input: { text: PREVIEW_TEXT },
        voice: { languageCode: 'es-US', name: `es-US-Chirp3-HD-${voice}` },
        audioConfig: { audioEncoding: 'MP3', speakingRate: parseFloat(document.getElementById('speedRange').value) }
      })
    });
    if (!resp.ok) { const e = await resp.json(); throw new Error(e.error?.message || `Error ${resp.status}`); }
    const data = await resp.json();
    const binary = atob(data.audioContent);
    const bytes = new Uint8Array(binary.length);
    for (let j = 0; j < binary.length; j++) bytes[j] = binary.charCodeAt(j);
    const audioUrl = URL.createObjectURL(new Blob([bytes], { type: 'audio/mpeg' }));
    if (window._previewAudio) window._previewAudio.pause();
    window._previewAudio = new Audio(audioUrl);
    window._previewAudio.play();
    setStatus(`Preview: ${voice}`, 'ok');
    window._previewAudio.onended = () => { btnEl.textContent = '▶'; btnEl.disabled = false; };
  } catch(e) {
    setStatus('Error: ' + e.message, 'error');
    btnEl.textContent = '▶';
    btnEl.disabled = false;
  }
}

// ─── Tabs ──────────────────────────────────────────────────────
function switchTab(name, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
  updateGenBtn();
}

function updateGenBtn() {
  const activeTab = document.querySelector('.tab.active')?.dataset?.tab;
  document.getElementById('genBtn').style.display = activeTab === 'ia' ? 'none' : 'block';
}

function updateCount() {
  document.getElementById('charCount').textContent = document.getElementById('textInput').value.length;
}

function loadFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const textTab = document.querySelector('.tab[data-tab="text"]');
    switchTab('text', textTab);
    document.getElementById('textInput').value = ev.target.result;
    updateCount();
    setStatus('Archivo cargado: ' + file.name, 'ok');
  };
  reader.readAsText(file);
}

function setStatus(msg, type) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status ' + (type || '');
}

function setProgress(pct, msg) {
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = msg;
}

// ─── Backend: submit job ───────────────────────────────────────
async function submitJob() {
  const bkey = getBackendKey();
  const prompt = document.getElementById('promptInput').value.trim();
  if (!bkey) { setStatus('Ingresá tu Narrador API key para usar el backend', 'error'); return; }
  if (!prompt) { setStatus('Escribí el prompt antes de generar', 'error'); return; }

  const btn = document.getElementById('claudeBtn');
  btn.disabled = true;
  btn.textContent = '✦ Enviando...';

  try {
    const resp = await fetch(`${BACKEND_URL}/jobs`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-API-Key': bkey },
      body: JSON.stringify({
        prompt,
        model:      document.getElementById('modelSelect').value,
        voice:      selectedVoice,
        speed:      parseFloat(document.getElementById('speedRange').value),
        web_search: document.getElementById('webSearchToggle').checked,
      })
    });
    if (!resp.ok) {
      const e = await resp.json().catch(() => ({}));
      throw new Error(e.error || `Error ${resp.status}`);
    }
    const job = await resp.json();
    _jobs = [job, ..._jobs.filter(j => j.id !== job.id)];
    renderJobs();
    document.getElementById('promptInput').value = '';
    setStatus('✓ Podcast encolado — podés cerrar la app y volver cuando esté listo', 'ok');
  } catch(e) {
    setStatus('Error al enviar: ' + e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = '✦ Generar podcast';
  }
}

// ─── Backend: jobs list & polling ─────────────────────────────
let _jobs = [];
let _pollTimer = null;

async function loadJobs() {
  const bkey = getBackendKey();
  if (!bkey) return;
  try {
    const resp = await fetch(`${BACKEND_URL}/jobs`, { headers: { 'X-API-Key': bkey } });
    if (!resp.ok) return;
    _jobs = await resp.json();
    renderJobs();
  } catch(e) {}
}

function startPolling() {
  if (_pollTimer) return;
  _pollTimer = setInterval(async () => {
    const active = _jobs.some(j => ['pending','writing','recording'].includes(j.status));
    if (!active) return;
    const bkey = getBackendKey();
    if (!bkey) return;
    try {
      const resp = await fetch(`${BACKEND_URL}/jobs`, { headers: { 'X-API-Key': bkey } });
      if (!resp.ok) return;
      _jobs = await resp.json();
      renderJobs();
    } catch(e) {}
  }, 3000);
}

function timeAgo(iso) {
  const diff = Math.round((Date.now() - new Date(iso)) / 1000);
  if (diff < 60) return `${diff}s`;
  if (diff < 3600) return `${Math.round(diff/60)}min`;
  return `${Math.round(diff/3600)}h`;
}

function renderJobs() {
  const section = document.getElementById('jobsSection');
  const list = document.getElementById('jobsList');
  if (!_jobs.length) { section.style.display = 'none'; return; }
  section.style.display = 'block';

  list.innerHTML = '';
  _jobs.forEach(job => {
    const card = document.createElement('div');
    card.className = `job-card status-${job.status}`;
    card.id = `job-${job.id}`;

    const isActive = ['pending','writing','recording'].includes(job.status);
    const isDone = job.status === 'done';
    const isError = job.status === 'error';

    const title = job.title || job.prompt.slice(0, 60) + (job.prompt.length > 60 ? '...' : '');
    const modelShort = job.model.replace('claude-','').replace('-latest','');
    const searchBadge = job.search_count > 0 ? ` · 🔎${job.search_count}` : '';
    const meta = isDone
      ? `${modelShort}${searchBadge}`
      : isError ? 'error' : timeAgo(job.updated_at);

    card.innerHTML = `
      <div class="job-header">
        <span class="job-title">${escHtml(title)}</span>
        <span class="job-meta">${escHtml(meta)}</span>
      </div>
      ${isActive ? `
        <div class="job-progress ${isActive ? 'pulsing' : ''}">
          <div class="progress-bar-bg">
            <div class="progress-bar-fill" style="width:${job.progress_pct || 0}%"></div>
          </div>
          <div class="progress-text">${escHtml(job.progress_text || 'Preparando...')}</div>
        </div>` : ''}
      ${isError ? `<div class="progress-text" style="color:var(--red);margin-bottom:10px">${escHtml(job.error || 'Error desconocido')}</div>` : ''}
      <div class="job-actions">
        ${isDone ? `
          <button class="job-btn play" onclick="playJob('${job.id}')">▶ Escuchar</button>
          ${navigator.share ? `<button class="job-btn" onclick="shareJob('${job.id}')">⇪ Compartir</button>` : ''}
        ` : ''}
        <button class="job-btn del" onclick="deleteJob('${job.id}')">✕ Borrar</button>
      </div>
    `;
    list.appendChild(card);
  });
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function playJob(jid) {
  const bkey = getBackendKey();
  const btn = document.querySelector(`#job-${jid} .job-btn.play`);
  if (btn) { btn.disabled = true; btn.textContent = '…'; }

  try {
    const resp = await fetch(`${BACKEND_URL}/jobs/${jid}/audio`, { headers: { 'X-API-Key': bkey } });
    if (!resp.ok) throw new Error('No se pudo descargar el audio');
    const blob = await resp.blob();
    window._currentBlob = blob;
    const url = URL.createObjectURL(blob);

    const job = _jobs.find(j => j.id === jid);
    document.getElementById('playerTitle').textContent = job?.title || 'Podcast';
    const audio = document.getElementById('audioPlayer');
    audio.src = url;
    document.getElementById('downloadBtn').href = url;
    document.getElementById('downloadBtn').download = (job?.title || 'narrador').slice(0,40).replace(/\s+/g,'_').toLowerCase() + '.mp3';
    document.getElementById('playerWrap').style.display = 'block';
    audio.play();
    audio.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  } catch(e) {
    setStatus('Error al cargar audio: ' + e.message, 'error');
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = '▶ Escuchar'; }
  }
}

async function shareJob(jid) {
  const bkey = getBackendKey();
  const job = _jobs.find(j => j.id === jid);
  try {
    const resp = await fetch(`${BACKEND_URL}/jobs/${jid}/audio`, { headers: { 'X-API-Key': bkey } });
    if (!resp.ok) throw new Error();
    const blob = await resp.blob();
    const filename = (job?.title || 'narrador').slice(0,40).replace(/[^\w\s-]/g,'').replace(/\s+/g,'_').toLowerCase() + '.mp3';
    const file = new File([blob], filename, { type: 'audio/mpeg' });
    if (navigator.canShare?.({ files: [file] })) {
      await navigator.share({ files: [file], title: filename });
    } else if (navigator.share) {
      await navigator.share({ title: filename });
    }
  } catch(e) {
    if (e.name !== 'AbortError') setStatus('Error al compartir: ' + e.message, 'error');
  }
}

async function deleteJob(jid) {
  const bkey = getBackendKey();
  try {
    await fetch(`${BACKEND_URL}/jobs/${jid}`, { method: 'DELETE', headers: { 'X-API-Key': bkey } });
    _jobs = _jobs.filter(j => j.id !== jid);
    renderJobs();
  } catch(e) {
    setStatus('Error al borrar: ' + e.message, 'error');
  }
}

// ─── Direct TTS (tabs Texto y PDF) ────────────────────────────
function cleanMarkdown(text) {
  return text
    .replace(/^#{1,6}\s+/gm, '')
    .replace(/^---+$/gm, '')
    .replace(/^\*{3,}$/gm, '')
    .replace(/\*\*(.+?)\*\*/g, '$1')
    .replace(/\*(.+?)\*/g, '$1')
    .replace(/^>\s+/gm, '')
    .replace(/^[-*+]\s+/gm, '')
    .replace(/^\d+\.\s+/gm, '')
    .replace(/`{1,3}[^`]*`{1,3}/g, '')
    .replace(/\[(.+?)\]\(.+?\)/g, '$1')
    .replace(/\n{3,}/g, '\n\n')
    .trim();
}

function splitText(text, maxBytes = 3800) {
  const chunks = [];
  const paragraphs = text.split(/\n\n+/);
  let current = '';
  for (const para of paragraphs) {
    const candidate = current ? current + '\n\n' + para : para;
    if (new TextEncoder().encode(candidate).length > maxBytes) {
      if (current) chunks.push(current.trim());
      current = para;
    } else {
      current = candidate;
    }
  }
  if (current) chunks.push(current.trim());
  return chunks;
}

async function generate() {
  const apiKey = document.getElementById('apiKey').value.trim() || localStorage.getItem('gcpKey');
  const text = document.getElementById('textInput').value.trim();
  const speed = parseFloat(document.getElementById('speedRange').value);

  if (!apiKey) { setStatus('Ingresá tu API Key de Google TTS', 'error'); return; }
  if (!text)   { setStatus('Escribí o pegá algún texto', 'error'); return; }

  const btn = document.getElementById('genBtn');
  btn.disabled = true;
  btn.textContent = 'Generando...';
  btn.classList.add('generating');

  const progressWrap = document.getElementById('progressWrap');
  progressWrap.style.display = 'block';
  document.getElementById('playerWrap').style.display = 'none';
  setStatus('');

  const chunks = splitText(cleanMarkdown(text));
  const url = `https://texttospeech.googleapis.com/v1beta1/text:synthesize?key=${apiKey}`;
  const voiceName = `es-US-Chirp3-HD-${selectedVoice}`;
  let completed = 0;
  setProgress(0, `Generando ${chunks.length} partes en paralelo...`);

  const synthChunk = async (chunkText, idx) => {
    const resp = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        input: { text: chunkText },
        voice: { languageCode: 'es-US', name: voiceName },
        audioConfig: { audioEncoding: 'MP3', speakingRate: speed }
      })
    });
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err.error?.message || `Error ${resp.status} en parte ${idx+1}`);
    }
    const data = await resp.json();
    const binary = atob(data.audioContent);
    const bytes = new Uint8Array(binary.length);
    for (let j = 0; j < binary.length; j++) bytes[j] = binary.charCodeAt(j);
    completed++;
    setProgress(Math.round((completed / chunks.length) * 90), `${completed} / ${chunks.length} partes listas...`);
    return bytes;
  };

  let audioParts;
  try {
    audioParts = await Promise.all(chunks.map((c, i) => synthChunk(c, i)));
  } catch(e) {
    setStatus('Error: ' + e.message, 'error');
    btn.disabled = false;
    btn.textContent = '▶ Generar Audio';
    btn.classList.remove('generating');
    progressWrap.style.display = 'none';
    return;
  }

  setProgress(95, 'Uniendo partes...');

  const totalLength = audioParts.reduce((acc, p) => acc + p.length, 0);
  const combined = new Uint8Array(totalLength);
  let offset = 0;
  for (const part of audioParts) { combined.set(part, offset); offset += part.length; }

  const blob = new Blob([combined], { type: 'audio/mpeg' });
  window._currentBlob = blob;
  const blobUrl = URL.createObjectURL(blob);

  const audio = document.getElementById('audioPlayer');
  audio.src = blobUrl;
  document.getElementById('downloadBtn').href = blobUrl;
  document.getElementById('playerTitle').textContent = text.split('\n')[0].substring(0, 50) || 'Audio generado';

  setProgress(100, 'Listo');
  setTimeout(() => { progressWrap.style.display = 'none'; }, 800);

  document.getElementById('playerWrap').style.display = 'block';
  audio.play();

  btn.disabled = false;
  btn.textContent = '▶ Generar Audio';
  btn.classList.remove('generating');
  setStatus(`✓ ${chunks.length} parte${chunks.length > 1 ? 's' : ''} generadas — voz: ${selectedVoice}`, 'ok');
}

async function shareBlob(blob, filename) {
  if (!blob) return;
  try {
    const file = new File([blob], filename, { type: 'audio/mpeg' });
    if (navigator.canShare?.({ files: [file] })) {
      await navigator.share({ files: [file], title: filename });
    } else if (navigator.share) {
      await navigator.share({ title: filename });
    }
  } catch(e) {
    if (e.name !== 'AbortError') setStatus('Error al compartir: ' + e.message, 'error');
  }
}
